<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logika Digital | Enterprise AI OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bg-grid { background-image: radial-gradient(circle, #222 1px, transparent 1px); background-size: 30px 30px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        .ai-glow { box-shadow: 0 0 60px -15px rgba(234, 179, 8, 0.4); }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #eab308; cursor: pointer; border: 2px solid #000; margin-top: -8px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const apiKey = ""; 
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        const WA_NUMBER = "6283879527517"; // Nomor lo udah masuk sini

        const App = () => {
            const [activeTab, setActiveTab] = useState('demo');
            const [chatInput, setChatInput] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'bot', content: 'Infrastruktur AI Logika Digital Aktif. Masukkan simulasi tantangan bisnis Anda.' }
            ]);
            const [logs, setLogs] = useState([
                { id: 1, time: new Date().toLocaleTimeString(), type: 'sys', msg: 'System Core v5.1 Authenticated.' },
                { id: 2, time: new Date().toLocaleTimeString(), type: 'success', msg: 'Neural Network Sync: STABLE.' }
            ]);

            // Dashboard States
            const [adminCount, setAdminCount] = useState(3);
            const [salary, setSalary] = useState(4500000);

            const logEndRef = useRef(null);
            useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [logs]);
            useEffect(() => { lucide.createIcons(); }, [activeTab, messages]);

            const pushLog = (msg, type = 'info') => {
                setLogs(prev => [...prev, { id: Date.now(), time: new Date().toLocaleTimeString(), msg, type }]);
            };

            const callGemini = async (prompt, retries = 5, delay = 1000) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "Anda adalah AI Business Architect dari Logika Digital. Anda ahli dalam otomasi dan infrastruktur bisnis. Berikan jawaban yang cerdas, teknis, singkat, dan sangat meyakinkan dalam bahasa Indonesia. Selalu hubungkan jawaban Anda dengan efisiensi biaya." }] }
                        })
                    });
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Gagal mendapatkan respon neural.";
                } catch (err) {
                    if (retries > 0) {
                        pushLog(`Retrying Neural Link... (${6-retries}/5)`, 'warn');
                        await new Promise(r => setTimeout(r, delay));
                        return callGemini(prompt, retries - 1, delay * 2);
                    }
                    throw err;
                }
            };

            const handleChat = async (e) => {
                if(e) e.preventDefault();
                if (!chatInput || isProcessing) return;

                const userMsg = chatInput;
                setChatInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setIsProcessing(true);
                pushLog(`Analyzing lead intent: ${userMsg.substring(0, 15)}...`, 'sys');

                try {
                    const result = await callGemini(userMsg);
                    setMessages(prev => [...prev, { role: 'bot', content: result }]);
                    pushLog("Execution sequence completed.", "success");
                } catch (error) {
                    pushLog(`Neural Error: ${error.message}`, "error");
                    setMessages(prev => [...prev, { role: 'bot', content: "Gangguan koneksi neural terdeteksi. Silakan coba lagi." }]);
                } finally {
                    setIsProcessing(false);
                }
            };

            const openWA = () => {
                window.open(`https://wa.me/${WA_NUMBER}?text=Halo%20Logika%20Digital,%20saya%20tertarik%20dengan%20infrastruktur%20AI%20Anda.`, '_blank');
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#050505]">
                    {/* Sidebar Nav */}
                    <nav className="w-full md:w-24 bg-black border-r border-white/5 flex md:flex-col items-center py-10 gap-10 px-6 md:px-0 z-50">
                        <div className="w-14 h-14 bg-yellow-500 rounded-2xl flex items-center justify-center shadow-2xl shadow-yellow-500/20">
                            <i data-lucide="cpu" className="text-black w-7 h-7"></i>
                        </div>
                        <div className="flex md:flex-col gap-10 flex-1 justify-center">
                            <button onClick={() => setActiveTab('dashboard')} className={`p-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-white text-black' : 'text-zinc-600 hover:text-white'}`}>
                                <i data-lucide="layout-dashboard"></i>
                            </button>
                            <button onClick={() => setActiveTab('demo')} className={`p-3 rounded-xl transition-all ${activeTab === 'demo' ? 'bg-white text-black' : 'text-zinc-600 hover:text-white'}`}>
                                <i data-lucide="zap"></i>
                            </button>
                            <button onClick={() => setActiveTab('crm')} className={`p-3 rounded-xl transition-all ${activeTab === 'crm' ? 'bg-white text-black' : 'text-zinc-600 hover:text-white'}`}>
                                <i data-lucide="database"></i>
                            </button>
                        </div>
                    </nav>

                    {/* Main Workspace */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <header className="h-20 border-b border-white/5 flex items-center justify-between px-10 glass sticky top-0 z-40">
                            <div>
                                <h1 className="text-2xl font-black italic tracking-tighter">LOGIKA <span className="text-yellow-500 underline decoration-2">DIGITAL</span></h1>
                                <p className="text-[10px] font-mono text-zinc-500 tracking-[0.4em] uppercase">Private Alpha v5.2</p>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[10px] font-black text-yellow-500 tracking-widest">SYSTEM_LIVE</p>
                                    <p className="text-[9px] text-zinc-600 font-mono">ENCRYPTED_TUNNEL</p>
                                </div>
                                <div className="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center bg-white/5 cursor-pointer">
                                    <i data-lucide="shield-check" className="w-6 h-6 text-yellow-500"></i>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 p-6 md:p-12 overflow-y-auto custom-scrollbar bg-grid">
                            {activeTab === 'dashboard' && (
                                <div className="max-w-6xl mx-auto space-y-10 animate-in fade-in duration-700">
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="lg:col-span-2 glass rounded-[3rem] p-10">
                                            <h3 className="text-xs font-black uppercase tracking-[0.2em] mb-12 text-zinc-500 italic">ROI Efficiency Control</h3>
                                            <div className="space-y-16">
                                                <div className="space-y-6">
                                                    <div className="flex justify-between font-bold text-sm uppercase tracking-widest">
                                                        <span>Admin Resources</span>
                                                        <span className="text-yellow-500 underline">{adminCount} Personel</span>
                                                    </div>
                                                    <input type="range" min="1" max="15" value={adminCount} onChange={(e)=>setAdminCount(e.target.value)} className="w-full"/>
                                                </div>
                                                <div className="space-y-6">
                                                    <div className="flex justify-between font-bold text-sm uppercase tracking-widest">
                                                        <span>Monthly Salary Base</span>
                                                        <span className="text-yellow-500 underline">Rp {parseInt(salary).toLocaleString('id-ID')}</span>
                                                    </div>
                                                    <input type="range" min="3000000" max="15000000" step="500000" value={salary} onChange={(e)=>setSalary(e.target.value)} className="w-full"/>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-yellow-500 rounded-[3rem] p-10 text-black flex flex-col justify-between shadow-2xl shadow-yellow-500/30">
                                            <div>
                                                <i data-lucide="trending-up" className="w-10 h-10 mb-6"></i>
                                                <h4 className="text-3xl font-black italic uppercase leading-none mb-4">Profit <br/>Optimization</h4>
                                                <p className="text-xs font-bold opacity-80 leading-relaxed italic">Sistem ini memangkas biaya operasional Anda lebih dari 70% secara otonom.</p>
                                            </div>
                                            <div className="pt-10 border-t border-black/10">
                                                <p className="text-[10px] font-black uppercase mb-1 opacity-60 tracking-widest">Savings / Bulan</p>
                                                <p className="text-5xl font-black tracking-tighter italic">Rp {(adminCount * salary - 2500000).toLocaleString('id-ID')}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                        {[
                                            { label: 'Uptime', val: '99.9%', icon: 'activity' },
                                            { label: 'Security', val: 'Lvl 5', icon: 'lock' },
                                            { label: 'Accuracy', val: '98.2%', icon: 'check-circle' },
                                            { label: 'Latency', val: '180ms', icon: 'zap' }
                                        ].map((m, i) => (
                                            <div key={i} className="glass p-8 rounded-[2rem] text-center group hover:border-yellow-500/50 transition-all">
                                                <i data-lucide={m.icon} className="text-yellow-500 mb-4 w-6 h-6 mx-auto group-hover:scale-125 transition-transform"></i>
                                                <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">{m.label}</p>
                                                <p className="text-2xl font-black">{m.val}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'demo' && (
                                <div className="max-w-6xl mx-auto h-full grid grid-cols-1 lg:grid-cols-12 gap-8 animate-in zoom-in-95 duration-500">
                                    {/* AI Engine Terminal */}
                                    <div className="lg:col-span-8 flex flex-col glass rounded-[3rem] overflow-hidden ai-glow">
                                        <div className="p-8 border-b border-white/5 flex items-center justify-between bg-white/[0.02]">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center text-black shadow-lg shadow-yellow-500/20">
                                                    <i data-lucide="message-square" className="w-6 h-6"></i>
                                                </div>
                                                <div>
                                                    <h3 className="text-base font-black uppercase italic tracking-widest">Neural Link Demo</h3>
                                                    <p className="text-[10px] text-green-500 font-bold uppercase tracking-widest mt-1 animate-pulse">Connection: Active</p>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex-1 p-8 overflow-y-auto space-y-8 bg-black/40 custom-scrollbar">
                                            {messages.map((m, i) => (
                                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2`}>
                                                    <div className={`max-w-[85%] p-6 rounded-3xl text-sm font-medium leading-relaxed shadow-xl ${m.role === 'user' ? 'bg-white text-black font-bold' : 'bg-zinc-900 border border-white/10 text-zinc-100 italic'}`}>
                                                        {m.content}
                                                    </div>
                                                </div>
                                            ))}
                                            {isProcessing && (
                                                <div className="flex gap-3 items-center text-[10px] text-yellow-500 font-mono tracking-[0.3em] uppercase animate-pulse">
                                                    <i data-lucide="loader-2" className="w-4 h-4 animate-spin"></i> Neural processing...
                                                </div>
                                            )}
                                        </div>

                                        <form onSubmit={handleChat} className="p-8 bg-black border-t border-white/5 flex gap-4">
                                            <input 
                                                value={chatInput} 
                                                onChange={(e)=>setChatInput(e.target.value)} 
                                                disabled={isProcessing}
                                                type="text" 
                                                placeholder="Berikan tantangan bisnis (cth: Follow-up klien galak)..." 
                                                className="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-8 py-5 text-sm focus:border-yellow-500 outline-none transition-all placeholder:text-zinc-600 font-medium"
                                            />
                                            <button className="bg-yellow-500 text-black px-10 rounded-2xl font-black hover:scale-105 transition-all disabled:opacity-50 tracking-widest text-xs">
                                                EXECUTE
                                            </button>
                                        </form>
                                    </div>

                                    {/* Sidebar System Info */}
                                    <div className="lg:col-span-4 flex flex-col gap-6">
                                        <div className="flex-1 glass rounded-[3rem] flex flex-col overflow-hidden">
                                            <div className="p-6 border-b border-white/5 flex items-center gap-3">
                                                <i data-lucide="terminal" className="w-4 h-4 text-zinc-500"></i>
                                                <span className="text-[10px] font-black uppercase text-zinc-500 tracking-[0.2em] italic">System Core Log</span>
                                            </div>
                                            <div className="flex-1 p-6 font-mono text-[9px] overflow-y-auto custom-scrollbar space-y-4">
                                                {logs.map(log => (
                                                    <div key={log.id} className="flex gap-3 leading-relaxed">
                                                        <span className="text-zinc-700 shrink-0">[{log.time}]</span>
                                                        <span className={log.type === 'success' ? 'text-green-500' : log.type === 'sys' ? 'text-blue-500' : 'text-red-500'}>
                                                            {log.type === 'success' ? '✔' : '>'} {log.msg}
                                                        </span>
                                                    </div>
                                                ))}
                                                <div ref={logEndRef}></div>
                                            </div>
                                        </div>
                                        <div className="glass p-8 rounded-[3rem] flex items-center gap-4 border-yellow-500/20">
                                            <div className="w-12 h-12 bg-yellow-500 rounded-2xl flex items-center justify-center text-black shrink-0">
                                                <i data-lucide="zap"></i>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black uppercase tracking-widest text-zinc-500">Efficiency</p>
                                                <p className="text-2xl font-black italic tracking-tighter text-yellow-500">+340%</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'crm' && (
                                <div className="max-w-6xl mx-auto space-y-10 animate-in fade-in duration-700">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <h2 className="text-4xl font-black italic uppercase tracking-tighter">Neural Lead Matrix</h2>
                                            <p className="text-[10px] text-zinc-500 mt-2 uppercase tracking-[0.3em] font-bold">Autonomously captured by system</p>
                                        </div>
                                    </div>
                                    <div className="glass rounded-[3rem] overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="bg-white/5 text-[10px] font-black uppercase text-zinc-500 tracking-[0.3em]">
                                                    <th className="p-8">Lead Identifier</th>
                                                    <th className="p-8">Neural Status</th>
                                                    <th className="p-8">Profit Score</th>
                                                    <th className="p-8 text-right">Engagement</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5 text-sm">
                                                {[
                                                    { name: 'Lead_X_091', status: 'Priority', score: 98, time: '3m ago' },
                                                    { name: 'Lead_Y_042', status: 'Nurturing', score: 82, time: '18m ago' },
                                                    { name: 'Lead_Z_105', status: 'Closed', score: 100, time: '1h ago' }
                                                ].map((lead, i) => (
                                                    <tr key={i} className="hover:bg-white/[0.02] transition-colors group">
                                                        <td className="p-8 font-black font-mono text-zinc-400 group-hover:text-white transition-colors">{lead.name}</td>
                                                        <td className="p-8">
                                                            <span className={`px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${lead.status === 'Priority' ? 'bg-red-500/10 text-red-500' : 'bg-zinc-800 text-zinc-400'}`}>{lead.status}</span>
                                                        </td>
                                                        <td className="p-8 font-mono font-black text-yellow-500 text-lg">{lead.score}%</td>
                                                        <td className="p-8 text-right text-zinc-600 font-bold italic text-xs">{lead.time}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* WhatsApp CTA - FIXED WITH YOUR NUMBER */}
                    <div className="fixed bottom-12 right-12 z-[100]">
                        <button 
                            onClick={openWA} 
                            className="bg-yellow-500 text-black px-12 py-6 rounded-[2rem] font-black italic shadow-[0_20px_50px_rgba(234,179,8,0.5)] hover:scale-110 active:scale-95 transition-all flex items-center gap-6 text-xl group"
                        >
                            PASANG SEKARANG 
                            <i data-lucide="arrow-right" className="w-8 h-8 group-hover:translate-x-2 transition-transform"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
