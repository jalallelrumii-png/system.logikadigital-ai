<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logika Digital | Enterprise AI OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bg-grid { background-image: radial-gradient(circle, #222 1px, transparent 1px); background-size: 30px 30px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        .ai-glow { box-shadow: 0 0 60px -15px rgba(234, 179, 8, 0.4); }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #eab308; cursor: pointer; border: 2px solid #000; margin-top: -8px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // API Key Lo udah masuk di sini, jangan disebar sembarangan!
        const apiKey = "AIzaSyA6lvInbiPjUhiwFCtEf5NzMvsrRlmsS9A"; 
        
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        const TTS_MODEL = "gemini-2.5-flash-preview-tts";
        const WA_NUMBER = "6283879527517"; 

        // Helper for TTS (PCM to WAV)
        const pcmToWav = (pcmData, sampleRate) => {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            let offset = 44;
            for (let i = 0; i < pcmData.length; i++, offset += 2) {
                view.setInt16(offset, pcmData[i], true);
            }
            return new Blob([buffer], { type: 'audio/wav' });
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('demo');
            const [chatInput, setChatInput] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'bot', content: 'Sistem Logika Digital online. API Key terdeteksi. Silakan uji coba infrastruktur AI kami secara langsung.' }
            ]);
            const [logs, setLogs] = useState([
                { id: 1, time: new Date().toLocaleTimeString(), type: 'sys', msg: 'Neural Engine v5.3 Booting...' },
                { id: 2, time: new Date().toLocaleTimeString(), type: 'success', msg: 'API Key Authenticated. Secure Connection Ready.' }
            ]);

            const [adminCount, setAdminCount] = useState(3);
            const [salary, setSalary] = useState(4500000);
            const [strategy, setStrategy] = useState("");
            const [isGeneratingStrategy, setIsGeneratingStrategy] = useState(false);

            const [crmLeads, setCrmLeads] = useState([
                { id: 1, name: 'Lead_Alpha_99', status: 'Priority', score: 98, time: '3m ago', analysis: "" },
                { id: 2, name: 'Lead_Beta_42', status: 'Nurturing', score: 82, time: '18m ago', analysis: "" },
                { id: 3, name: 'Lead_Gamma_10', status: 'Closed', score: 100, time: '1h ago', analysis: "" }
            ]);
            const [auditingLeadId, setAuditingLeadId] = useState(null);

            const logEndRef = useRef(null);
            useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [logs]);
            useEffect(() => { lucide.createIcons(); }, [activeTab, messages, strategy, auditingLeadId, crmLeads]);

            const pushLog = (msg, type = 'info') => {
                setLogs(prev => [...prev, { id: Date.now(), time: new Date().toLocaleTimeString(), msg, type }]);
            };

            const callGemini = async (prompt, systemPrompt = "Anda adalah AI Business Architect dari Logika Digital.", retries = 5, delay = 1000) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Gagal mendapatkan respon neural.";
                } catch (err) {
                    if (retries > 0) {
                        pushLog(`Retrying Neural Link... (${6-retries}/5)`, 'warn');
                        await new Promise(r => setTimeout(r, delay));
                        return callGemini(prompt, systemPrompt, retries - 1, delay * 2);
                    }
                    throw err;
                }
            };

            const callTTS = async (text) => {
                setIsSpeaking(true);
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Say in a professional Indonesian accent: ${text}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: { voiceName: "Puck" }
                                    }
                                }
                            }
                        })
                    });
                    const data = await response.json();
                    const audioBase64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    const mimeType = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.mimeType;
                    const sampleRate = mimeType ? parseInt(mimeType.split('rate=')[1]) : 24000;

                    if (audioBase64) {
                        const binaryString = atob(audioBase64);
                        const len = binaryString.length;
                        const bytes = new Int16Array(len / 2);
                        for (let i = 0; i < len; i += 2) {
                            bytes[i / 2] = binaryString.charCodeAt(i) | (binaryString.charCodeAt(i + 1) << 8);
                        }
                        const wavBlob = pcmToWav(bytes, sampleRate);
                        const audioUrl = URL.createObjectURL(wavBlob);
                        const audio = new Audio(audioUrl);
                        audio.onended = () => setIsSpeaking(false);
                        audio.play();
                    }
                } catch (err) {
                    setIsSpeaking(false);
                }
            };

            const handleChat = async (e) => {
                if(e) e.preventDefault();
                if (!chatInput || isProcessing) return;

                const userMsg = chatInput;
                setChatInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setIsProcessing(true);
                pushLog(`Neural Analysis: ${userMsg.substring(0, 15)}...`, 'sys');

                try {
                    const result = await callGemini(userMsg);
                    setMessages(prev => [...prev, { role: 'bot', content: result }]);
                    pushLog("Execution sequence successful.", "success");
                    callTTS(result.substring(0, 250)); 
                } catch (error) {
                    pushLog(`Neural Error: ${error.message}`, "error");
                    setMessages(prev => [...prev, { role: 'bot', content: "Terjadi gangguan koneksi neural. Harap coba lagi." }]);
                } finally {
                    setIsProcessing(false);
                }
            };

            const generateStrategy = async () => {
                setIsGeneratingStrategy(true);
                pushLog("Calculating custom automation strategy...", "sys");
                const prompt = `Analisis data: ${adminCount} admin dengan gaji Rp ${salary}. Total biaya Rp ${adminCount * salary}. Berikan 3 poin strategi automasi infrastruktur spesifik untuk memangkas biaya ini secara signifikan.`;
                try {
                    const result = await callGemini(prompt, "Anda adalah Business Architect Senior.");
                    setStrategy(result);
                    pushLog("Automation strategy ready.", "success");
                } catch (e) {
                    pushLog("Calculation failed.", "error");
                } finally {
                    setIsGeneratingStrategy(false);
                }
            };

            const auditLead = async (leadId) => {
                setAuditingLeadId(leadId);
                const lead = crmLeads.find(l => l.id === leadId);
                pushLog(`Neural Audit: ${lead.name}...`, "sys");
                const prompt = `Lakukan audit teknis singkat untuk Lead: ${lead.name}, Status: ${lead.status}, Score: ${lead.score}%. Berikan instruksi follow-up otonom.`;
                try {
                    const result = await callGemini(prompt, "Anda adalah Lead Auditor AI.");
                    setCrmLeads(prev => prev.map(l => l.id === leadId ? { ...l, analysis: result } : l));
                    pushLog(`Audit complete for ${lead.name}`, "success");
                } catch (e) {
                    pushLog("Audit sequence failed.", "error");
                } finally {
                    setAuditingLeadId(null);
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#050505]">
                    {/* Navigation */}
                    <nav className="w-full md:w-24 bg-black border-r border-white/5 flex md:flex-col items-center py-10 gap-10 px-6 md:px-0 z-50">
                        <div className="w-14 h-14 bg-yellow-500 rounded-2xl flex items-center justify-center shadow-2xl shadow-yellow-500/20">
                            <i data-lucide="cpu" className="text-black w-7 h-7"></i>
                        </div>
                        <div className="flex md:flex-col gap-10 flex-1 justify-center text-zinc-600">
                            <button onClick={() => setActiveTab('dashboard')} className={`p-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-white text-black' : 'hover:text-white'}`}><i data-lucide="layout-dashboard"></i></button>
                            <button onClick={() => setActiveTab('demo')} className={`p-3 rounded-xl transition-all ${activeTab === 'demo' ? 'bg-white text-black' : 'hover:text-white'}`}><i data-lucide="zap"></i></button>
                            <button onClick={() => setActiveTab('crm')} className={`p-3 rounded-xl transition-all ${activeTab === 'crm' ? 'bg-white text-black' : 'hover:text-white'}`}><i data-lucide="database"></i></button>
                        </div>
                    </nav>

                    {/* Content */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="h-20 border-b border-white/5 flex items-center justify-between px-10 glass z-40">
                            <div>
                                <h1 className="text-2xl font-black italic tracking-tighter">LOGIKA <span className="text-yellow-500 underline decoration-2">DIGITAL</span></h1>
                                <p className="text-[10px] font-mono text-zinc-500 tracking-[0.4em] uppercase leading-none">Powered by Gemini ✨</p>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[10px] font-black text-yellow-500">NEURAL_LINK_OK</p>
                                    <p className="text-[9px] text-zinc-600 font-mono tracking-tighter uppercase">SECURE_ACTIVE</p>
                                </div>
                                <div className="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center bg-white/5">
                                    {isSpeaking ? <i data-lucide="volume-2" className="text-yellow-500 animate-bounce"></i> : <i data-lucide="shield-check" className="text-yellow-500"></i>}
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 p-6 md:p-12 overflow-y-auto custom-scrollbar bg-grid">
                            {activeTab === 'dashboard' && (
                                <div className="max-w-6xl mx-auto space-y-10 animate-fade-in">
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="lg:col-span-2 glass rounded-[3rem] p-10">
                                            <h3 className="text-xs font-black uppercase tracking-[0.2em] mb-12 text-zinc-500">Financial ROI Monitor</h3>
                                            <div className="space-y-16">
                                                <div className="space-y-6">
                                                    <div className="flex justify-between font-bold text-sm uppercase tracking-widest">
                                                        <span>Human Admin Count</span>
                                                        <span className="text-yellow-500 underline">{adminCount} Person</span>
                                                    </div>
                                                    <input type="range" min="1" max="15" value={adminCount} onChange={(e)=>setAdminCount(e.target.value)} className="w-full"/>
                                                </div>
                                                <div className="space-y-6">
                                                    <div className="flex justify-between font-bold text-sm uppercase tracking-widest">
                                                        <span>Avg Salary Base</span>
                                                        <span className="text-yellow-500 underline">Rp {parseInt(salary).toLocaleString('id-ID')}</span>
                                                    </div>
                                                    <input type="range" min="1500000" max="15000000" step="500000" value={salary} onChange={(e)=>setSalary(e.target.value)} className="w-full"/>
                                                </div>
                                            </div>
                                            <div className="mt-12 pt-8 border-t border-white/5">
                                                <button onClick={generateStrategy} disabled={isGeneratingStrategy} className="bg-white/5 hover:bg-yellow-500 hover:text-black border border-white/10 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-3 transition-all">
                                                    {isGeneratingStrategy ? <i data-lucide="loader-2" className="animate-spin w-4 h-4"></i> : "Generate Logic Strategy ✨"}
                                                </button>
                                                {strategy && <div className="mt-6 p-6 bg-yellow-500/5 border border-yellow-500/20 rounded-3xl text-xs italic text-yellow-100 whitespace-pre-wrap">{strategy}</div>}
                                            </div>
                                        </div>
                                        <div className="bg-yellow-500 rounded-[3rem] p-10 text-black flex flex-col justify-between shadow-2xl">
                                            <div><i data-lucide="trending-up" className="w-10 h-10 mb-6"></i><h4 className="text-3xl font-black italic uppercase leading-none mb-4">Cost <br/>Elimination</h4></div>
                                            <div className="pt-10 border-t border-black/10">
                                                <p className="text-[10px] font-black uppercase mb-1 opacity-60">Savings / Month</p>
                                                <p className="text-5xl font-black tracking-tighter italic text-black">Rp {Math.max(0, adminCount * salary - 2500000).toLocaleString('id-ID')}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'demo' && (
                                <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fade-in h-[500px]">
                                    <div className="lg:col-span-8 flex flex-col glass rounded-[3rem] overflow-hidden ai-glow">
                                        <div className="p-8 border-b border-white/5 flex items-center justify-between bg-white/[0.02]">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center text-black shadow-lg"><i data-lucide="message-square"></i></div>
                                                <div><h3 className="text-base font-black uppercase italic tracking-widest leading-none">Neural Core v5</h3><p className="text-[9px] text-green-500 font-bold uppercase mt-1">Live AI Instance</p></div>
                                            </div>
                                        </div>
                                        <div className="flex-1 p-8 overflow-y-auto space-y-8 bg-black/40 custom-scrollbar text-sm">
                                            {messages.map((m, i) => (
                                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`}>
                                                    <div className={`max-w-[85%] p-6 rounded-3xl ${m.role === 'user' ? 'bg-white text-black font-bold' : 'bg-zinc-900 border border-white/10 text-zinc-100 italic'}`}>{m.content}</div>
                                                </div>
                                            ))}
                                            {isProcessing && <div className="text-[9px] text-yellow-500 font-mono tracking-widest animate-pulse flex items-center gap-2"><i data-lucide="loader-2" className="animate-spin w-4 h-4"></i> EXECUTING NEURAL COMMAND...</div>}
                                        </div>
                                        <form onSubmit={handleChat} className="p-8 bg-black border-t border-white/5 flex gap-4">
                                            <input value={chatInput} onChange={(e)=>setChatInput(e.target.value)} disabled={isProcessing} type="text" placeholder="Berikan tantangan bisnis Anda..." className="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-8 py-5 text-sm focus:border-yellow-500 outline-none text-white"/>
                                            <button className="bg-yellow-500 text-black px-10 rounded-2xl font-black uppercase text-[10px] tracking-widest">SEND</button>
                                        </form>
                                    </div>
                                    <div className="lg:col-span-4 bg-black border border-white/5 rounded-[3rem] flex flex-col overflow-hidden">
                                        <div className="p-6 border-b border-white/5 flex items-center gap-3"><i data-lucide="terminal" className="w-4 h-4 text-zinc-500"></i><span className="text-[10px] font-black uppercase text-zinc-500">System Logs</span></div>
                                        <div className="flex-1 p-6 font-mono text-[9px] overflow-y-auto custom-scrollbar space-y-4">
                                            {logs.map(log => (
                                                <div key={log.id} className="flex gap-2 leading-relaxed">
                                                    <span className="text-zinc-700">[{log.time}]</span>
                                                    <span className={log.type === 'success' ? 'text-green-500' : log.type === 'sys' ? 'text-blue-500' : 'text-red-500'}>{log.type === 'success' ? '✔' : '>'} {log.msg}</span>
                                                </div>
                                            ))}
                                            <div ref={logEndRef}></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'crm' && (
                                <div className="max-w-6xl mx-auto space-y-10 animate-fade-in">
                                    <div className="glass rounded-[3rem] overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="bg-white/5 text-[10px] font-black uppercase text-zinc-500 tracking-widest">
                                                    <th className="p-8">Lead Identifier</th>
                                                    <th className="p-8">Neural Status</th>
                                                    <th className="p-8">Profit Score</th>
                                                    <th className="p-8">AI Analysis ✨</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5 text-sm">
                                                {crmLeads.map((lead, i) => (
                                                    <tr key={i} className="hover:bg-white/[0.02]">
                                                        <td className="p-8 font-black font-mono text-zinc-400">{lead.name}</td>
                                                        <td className="p-8"><span className={`px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${lead.status === 'Priority' ? 'bg-red-500/10 text-red-500' : 'bg-zinc-800 text-zinc-400'}`}>{lead.status}</span></td>
                                                        <td className="p-8 font-mono font-black text-yellow-500">{lead.score}%</td>
                                                        <td className="p-8">
                                                            {lead.analysis ? <p className="text-[10px] text-zinc-400 italic leading-tight max-w-[250px]">{lead.analysis}</p> : 
                                                            <button onClick={() => auditLead(lead.id)} disabled={auditingLeadId === lead.id} className="bg-white/5 hover:bg-yellow-500 hover:text-black border border-white/10 px-4 py-2 rounded-xl text-[9px] font-black uppercase transition-all">{auditingLeadId === lead.id ? "Analyzing..." : "Analyze ✨"}</button>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* WhatsApp CTA */}
                    <div className="fixed bottom-12 right-12 z-[100]">
                        <button onClick={()=>window.open(`https://wa.me/${WA_NUMBER}?text=Halo%20Logika%20Digital,%20saya%20tertarik%20dengan%20infrastruktur%20AI%20Anda.`,'_blank')} className="bg-yellow-500 text-black px-12 py-6 rounded-[2rem] font-black italic shadow-2xl hover:scale-110 active:scale-95 transition-all flex items-center gap-6 text-xl">PASANG SEKARANG <i data-lucide="arrow-right"></i></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Helper icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
