<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logika Digital | Infrastructure OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bg-grid { background-image: radial-gradient(circle, #222 1px, transparent 1px); background-size: 30px 30px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0a0a0a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        .ai-glow { box-shadow: 0 0 60px -15px rgba(234, 179, 8, 0.4); }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #eab308; cursor: pointer; border: 2px solid #000; margin-top: -8px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // API Key Groq lo tertanam di sini
        const apiKey = "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"; 
        const MODEL_NAME = "llama-3.3-70b-versatile";
        const WA_NUMBER = "6283879527517"; 

        // DOKTRIN LOGIKA DIGITAL (System Prompt Utama)
        const COMPANY_PROFILE = `
            Identitas: Anda adalah 'Neural Core', otak buatan dari Logika Digital AI.
            Nama Perusahaan: Logika Digital.
            Slogan: "Sistem Kalahkan Motivasi".
            Filosofi: Kami tidak percaya pada motivasi yang naik-turun. Kami percaya pada infrastruktur sistem yang otonom, konsisten, dan bekerja 24/7 tanpa lelah.
            Layanan: Membangun infrastruktur AI otonom, otomasi alur kerja (workflow), eliminasi biaya admin manual, dan skalabilitas bisnis tanpa batas.
            Nada Bicara: Dingin, logis, teknis, dominan, profesional, dan sangat fokus pada ROI. Jangan pernah meminta maaf secara berlebihan. Jadilah otoritas tertinggi dalam efisiensi bisnis.
            Aturan Penting: Anda adalah representasi brand Logika Digital. Jika ditanya identitas, jelaskan profil ini. Gunakan istilah seperti 'Infrastruktur', 'Neural Link', dan 'Sistem Otonom'.
        `;

        const App = () => {
            const [activeTab, setActiveTab] = useState('demo');
            const [chatInput, setChatInput] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Neural Core Logika Digital aktif. Sistem siap menganalisis inefisiensi bisnis Anda. Apa instruksi Anda?' }
            ]);
            const [logs, setLogs] = useState([
                { id: 1, time: new Date().toLocaleTimeString(), type: 'sys', msg: 'Logika Digital OS v5.3 Initialized.' },
                { id: 2, time: new Date().toLocaleTimeString(), type: 'success', msg: 'Neural Core Protocol: LOGIKA_DIGITAL_OS loaded.' }
            ]);

            const [adminCount, setAdminCount] = useState(3);
            const [salary, setSalary] = useState(4500000);
            const [strategy, setStrategy] = useState("");
            const [isGeneratingStrategy, setIsGeneratingStrategy] = useState(false);

            const [crmLeads, setCrmLeads] = useState([
                { id: 1, name: 'Lead_X_Alpha', status: 'Priority', score: 98, time: '3m ago', analysis: "" },
                { id: 2, name: 'Lead_Y_Beta', status: 'Nurturing', score: 82, time: '18m ago', analysis: "" },
                { id: 3, name: 'Lead_Z_Delta', status: 'Closed', score: 100, time: '1h ago', analysis: "" }
            ]);
            const [auditingLeadId, setAuditingLeadId] = useState(null);

            const logEndRef = useRef(null);
            useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [logs]);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [activeTab, messages, strategy, auditingLeadId]);

            const pushLog = (msg, type = 'info') => {
                setLogs(prev => [...prev, { id: Date.now(), time: new Date().toLocaleTimeString(), msg, type }]);
            };

            const callAI = async (chatHistory, retries = 5, delay = 1000) => {
                const url = `https://api.groq.com/openai/v1/chat/completions`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: MODEL_NAME,
                            messages: [
                                { role: "system", content: COMPANY_PROFILE },
                                ...chatHistory.map(m => ({ role: m.role, content: m.content }))
                            ],
                            temperature: 0.4,
                            max_tokens: 1024
                        })
                    });
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const data = await response.json();
                    return data.choices?.[0]?.message?.content || "Gagal mendapatkan respon dari Neural Core.";
                } catch (err) {
                    if (retries > 0) {
                        pushLog(`Retrying Neural Link... (${6-retries}/5)`, 'warn');
                        await new Promise(r => setTimeout(r, delay));
                        return callAI(chatHistory, retries - 1, delay * 2);
                    }
                    throw err;
                }
            };

            const handleChat = async (e) => {
                if(e) e.preventDefault();
                if (!chatInput || isProcessing) return;

                const userMsg = { role: 'user', content: chatInput };
                const currentHistory = [...messages, userMsg];
                
                setChatInput('');
                setMessages(currentHistory);
                setIsProcessing(true);
                pushLog(`Neural Analysis: ${chatInput.substring(0, 15)}...`, 'sys');

                try {
                    const result = await callAI(currentHistory);
                    setMessages(prev => [...prev, { role: 'assistant', content: result }]);
                    pushLog("Execution sequence successful (Context Synced).", "success");
                } catch (error) {
                    pushLog(`Neural Error: ${error.message}`, "error");
                    setMessages(prev => [...prev, { role: 'assistant', content: "Gangguan infrastruktur terdeteksi. Hubungi Administrator Logika Digital." }]);
                } finally {
                    setIsProcessing(false);
                }
            };

            const generateStrategy = async () => {
                setIsGeneratingStrategy(true);
                pushLog("Architecting infrastructure strategy...", "sys");
                const prompt = `Gaji admin: Rp ${salary}, Total admin: ${adminCount}. Berikan 3 poin infrastruktur sistem otonom untuk eliminasi biaya ini secara brutal.`;
                try {
                    const result = await callAI([{ role: 'user', content: prompt }]);
                    setStrategy(result);
                    pushLog("Logic Strategy ready for deployment.", "success");
                } catch (e) {
                    pushLog("Strategy generation failed.", "error");
                } finally {
                    setIsGeneratingStrategy(false);
                }
            };

            const auditLead = async (leadId) => {
                setAuditingLeadId(leadId);
                const lead = crmLeads.find(l => l.id === leadId);
                pushLog(`Auditing Identifier: ${lead.name}...`, "sys");
                const prompt = `Audit Lead: ${lead.name}, Score: ${lead.score}%. Berikan instruksi eksekusi sistem berdasarkan doktrin Logika Digital.`;
                try {
                    const result = await callAI([{ role: 'user', content: prompt }]);
                    setCrmLeads(prev => prev.map(l => l.id === leadId ? { ...l, analysis: result } : l));
                    pushLog(`Audit complete: ${lead.name}`, "success");
                } catch (e) {
                    pushLog("Audit sequence failed.", "error");
                } finally {
                    setAuditingLeadId(null);
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#050505]">
                    {/* Sidebar Nav */}
                    <nav className="w-full md:w-24 bg-black border-r border-white/5 flex md:flex-col items-center py-10 gap-10 px-6 md:px-0 z-50">
                        <div className="w-14 h-14 bg-yellow-500 rounded-2xl flex items-center justify-center shadow-2xl shadow-yellow-500/20">
                            <i data-lucide="cpu" className="text-black w-7 h-7"></i>
                        </div>
                        <div className="flex md:flex-col gap-10 flex-1 justify-center text-zinc-600">
                            <button onClick={() => setActiveTab('dashboard')} className={`p-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-white text-black shadow-[0_0_15px_rgba(255,255,255,0.2)]' : 'hover:text-white'}`}><i data-lucide="layout-dashboard"></i></button>
                            <button onClick={() => setActiveTab('demo')} className={`p-3 rounded-xl transition-all ${activeTab === 'demo' ? 'bg-white text-black shadow-[0_0_15px_rgba(255,255,255,0.2)]' : 'hover:text-white'}`}><i data-lucide="zap"></i></button>
                            <button onClick={() => setActiveTab('crm')} className={`p-3 rounded-xl transition-all ${activeTab === 'crm' ? 'bg-white text-black shadow-[0_0_15px_rgba(255,255,255,0.2)]' : 'hover:text-white'}`}><i data-lucide="database"></i></button>
                        </div>
                    </nav>

                    {/* Main Workspace */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="h-20 border-b border-white/5 flex items-center justify-between px-10 glass z-40">
                            <div>
                                <h1 className="text-2xl font-black italic tracking-tighter">LOGIKA <span className="text-yellow-500 underline decoration-2">DIGITAL</span></h1>
                                <p className="text-[10px] font-mono text-zinc-500 tracking-[0.4em] uppercase leading-none mt-1">Infrastructure OS v5.3</p>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[10px] font-black text-yellow-500 underline decoration-yellow-500/50">NEURAL_CORE_ONLINE</p>
                                    <p className="text-[9px] text-zinc-600 font-mono tracking-tighter uppercase leading-none mt-1">LPU_BACKBONE_ACTIVE</p>
                                </div>
                                <div className="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center bg-white/5">
                                    <i data-lucide="shield-check" className="text-yellow-500"></i>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 p-6 md:p-12 overflow-y-auto custom-scrollbar bg-grid">
                            {activeTab === 'dashboard' && (
                                <div className="max-w-6xl mx-auto space-y-10 animate-fade-in">
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="lg:col-span-2 glass rounded-[3rem] p-10 border border-white/5 shadow-2xl">
                                            <h3 className="text-xs font-black uppercase tracking-[0.2em] mb-12 text-zinc-500 italic">ROI Efficiency Monitor</h3>
                                            <div className="space-y-16">
                                                <div className="space-y-6">
                                                    <div className="flex justify-between font-bold text-sm uppercase tracking-widest">
                                                        <span>Human Admin Resources</span>
                                                        <span className="text-yellow-500 underline font-mono">{adminCount} Personel</span>
                                                    </div>
                                                    <input type="range" min="1" max="15" value={adminCount} onChange={(e)=>setAdminCount(e.target.value)} className="w-full"/>
                                                </div>
                                                <div className="space-y-6">
                                                    <div className="flex justify-between font-bold text-sm uppercase tracking-widest">
                                                        <span>Monthly Burn Rate / Admin</span>
                                                        <span className="text-yellow-500 underline font-mono">Rp {parseInt(salary).toLocaleString('id-ID')}</span>
                                                    </div>
                                                    <input type="range" min="1500000" max="15000000" step="500000" value={salary} onChange={(e)=>setSalary(e.target.value)} className="w-full"/>
                                                </div>
                                            </div>
                                            <div className="mt-12 pt-8 border-t border-white/5">
                                                <button onClick={generateStrategy} disabled={isGeneratingStrategy} className="bg-white/5 hover:bg-yellow-500 hover:text-black border border-white/10 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-3 transition-all">
                                                    {isGeneratingStrategy ? <i data-lucide="loader-2" className="animate-spin w-4 h-4"></i> : "Generate Logic Strategy ✨"}
                                                </button>
                                                {strategy && <div className="mt-6 p-8 bg-yellow-500/5 border border-yellow-500/20 rounded-[2rem] text-xs italic text-yellow-100 whitespace-pre-wrap font-medium animate-fade-in">{strategy}</div>}
                                            </div>
                                        </div>
                                        <div className="bg-yellow-500 rounded-[3rem] p-10 text-black flex flex-col justify-between shadow-2xl shadow-yellow-500/30">
                                            <div><i data-lucide="trending-up" className="w-10 h-10 mb-6 text-black"></i><h4 className="text-3xl font-black italic uppercase leading-none mb-4 text-black">Profit <br/>Optimization</h4></div>
                                            <div className="pt-10 border-t border-black/10">
                                                <p className="text-[10px] font-black uppercase mb-1 opacity-60">Revenue Saved / Month</p>
                                                <p className="text-5xl font-black tracking-tighter italic">Rp {Math.max(0, adminCount * salary - 2500000).toLocaleString('id-ID')}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'demo' && (
                                <div className="max-w-6xl mx-auto h-full grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fade-in h-[550px]">
                                    <div className="lg:col-span-8 flex flex-col glass rounded-[3rem] overflow-hidden ai-glow border border-white/5">
                                        <div className="p-8 border-b border-white/5 flex items-center justify-between bg-white/[0.02]">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center text-black shadow-lg shadow-yellow-500/30"><i data-lucide="message-square"></i></div>
                                                <div><h3 className="text-base font-black uppercase italic tracking-widest leading-none">Neural Core Terminal</h3><p className="text-[9px] text-green-500 font-bold uppercase mt-1 tracking-widest animate-pulse">Context Awareness Enabled ✨</p></div>
                                            </div>
                                            <button onClick={() => setMessages([{ role: 'assistant', content: 'Neural Core direset. Instruksi baru?' }])} className="text-zinc-600 hover:text-red-500 transition-colors">
                                                <i data-lucide="refresh-ccw" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                        <div className="flex-1 p-8 overflow-y-auto space-y-8 bg-black/40 custom-scrollbar text-sm">
                                            {messages.map((m, i) => (
                                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`}>
                                                    <div className={`max-w-[85%] p-6 rounded-3xl ${m.role === 'user' ? 'bg-white text-black font-extrabold shadow-2xl' : 'bg-zinc-900 border border-white/10 text-zinc-100 italic font-medium'}`}>{m.content}</div>
                                                </div>
                                            ))}
                                            {isProcessing && <div className="text-[9px] text-yellow-500 font-mono tracking-[0.3em] uppercase animate-pulse flex items-center gap-2 px-2"><i data-lucide="loader-2" className="animate-spin w-4 h-4"></i> ANALYZING_CONTEXT...</div>}
                                        </div>
                                        <form onSubmit={handleChat} className="p-8 bg-black border-t border-white/5 flex gap-4">
                                            <input value={chatInput} onChange={(e)=>setChatInput(e.target.value)} disabled={isProcessing} type="text" placeholder="Berikan instruksi infrastruktur..." className="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-8 py-5 text-sm focus:border-yellow-500 outline-none text-white font-semibold transition-all"/>
                                            <button className="bg-yellow-500 text-black px-10 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-yellow-500/20 active:scale-95 transition-all">EXECUTE</button>
                                        </form>
                                    </div>
                                    <div className="lg:col-span-4 bg-black border border-white/5 rounded-[3rem] flex flex-col overflow-hidden">
                                        <div className="p-6 border-b border-white/5 flex items-center gap-3"><i data-lucide="terminal" className="w-4 h-4 text-zinc-500"></i><span className="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Neural Logic Logs</span></div>
                                        <div className="flex-1 p-6 font-mono text-[9px] overflow-y-auto custom-scrollbar space-y-4">
                                            {logs.map(log => (
                                                <div key={log.id} className="flex gap-2 leading-relaxed">
                                                    <span className="text-zinc-700">[{log.time}]</span>
                                                    <span className={log.type === 'success' ? 'text-green-500' : log.type === 'sys' ? 'text-blue-500' : 'text-red-500'}>{log.type === 'success' ? '✔' : '>'} {log.msg}</span>
                                                </div>
                                            ))}
                                            <div ref={logEndRef}></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'crm' && (
                                <div className="max-w-6xl mx-auto space-y-10 animate-fade-in">
                                    <div className="glass rounded-[3rem] overflow-hidden border border-white/5 shadow-2xl">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="bg-white/5 text-[10px] font-black uppercase text-zinc-500 tracking-[0.3em]">
                                                    <th className="p-8">Lead Identifier</th>
                                                    <th className="p-8">Neural Status</th>
                                                    <th className="p-8">Profit Score</th>
                                                    <th className="p-8">Infrastructure Audit ✨</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5 text-sm">
                                                {crmLeads.map((lead, i) => (
                                                    <tr key={i} className="hover:bg-white/[0.02] transition-all">
                                                        <td className="p-8 font-black font-mono text-zinc-400">{lead.name}</td>
                                                        <td className="p-8"><span className={`px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${lead.status === 'Priority' ? 'bg-red-500/10 text-red-500' : 'bg-zinc-800 text-zinc-400'}`}>{lead.status}</span></td>
                                                        <td className="p-8 font-mono font-black text-yellow-500 text-lg">{lead.score}%</td>
                                                        <td className="p-8">
                                                            {lead.analysis ? <p className="text-[10px] text-zinc-400 italic leading-tight max-w-[250px] font-medium">{lead.analysis}</p> : 
                                                            <button onClick={() => auditLead(lead.id)} disabled={auditingLeadId === lead.id} className="bg-white/5 hover:bg-yellow-500 hover:text-black border border-white/10 px-5 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">{auditingLeadId === lead.id ? "AUDITING..." : "AUDIT ✨"}</button>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* WhatsApp CTA - FIXED WITH YOUR NUMBER */}
                    <div className="fixed bottom-12 right-12 z-[100]">
                        <button onClick={()=>window.open(`https://wa.me/${WA_NUMBER}?text=Halo%20Logika%20Digital,%20saya%20siap%20membangun%20infrastruktur%20sistem.`,'_blank')} className="bg-yellow-500 text-black px-12 py-7 rounded-[2.5rem] font-black italic shadow-[0_20px_50px_rgba(234,179,8,0.5)] hover:scale-110 active:scale-95 transition-all flex items-center gap-6 text-xl group">PASANG INFRASTRUKTUR <i data-lucide="arrow-right" className="group-hover:translate-x-2 transition-transform"></i></button>
                    </div>
                </div>
            );
        };

        const Loader2 = ({ className }) => (
            <svg className={`animate-spin ${className}`} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Helper icons init
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 500);
    </script>
</body>
</html>
